name: Update F1 Dashboard

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run updater
        run: python update.py

      - name: Commit changes
        run: |
          git config user.email "pitwall@rohan.dev"
          git config user.name "Pit Wall Bot"
          git add index.html
          git diff --staged --quiet || git commit -m "Auto-update after race weekend"
          git push
